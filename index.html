<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Distre</title>
<style>
  :root{
    --bg:#0f1115;
    --bg-soft:#161923;
    --card:#1b1f2a;
    --card-hover:#232838;
    --border:#2a2f3d;
    --text:#f2f3f5;
    --text-dim:#9aa0ad;
    --accent:#d4af6a;
    --accent-soft:#3a3320;
    --whatsapp:#25D366;
    --radius:14px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{min-height:100vh;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(180deg,rgba(15,17,21,.97),rgba(15,17,21,.9));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    padding:18px 20px;
  }
  .header-inner{
    max-width:1200px;margin:0 auto;
    display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand h1{margin:0;font-size:1.5rem;letter-spacing:.5px;font-weight:700;}
  .brand h1 span{color:var(--accent);}
  .brand small{color:var(--text-dim);font-size:.8rem;}

  .search-wrap{
    flex:1 1 320px;max-width:480px;position:relative;
  }
  .search-wrap input{
    width:100%;padding:12px 16px 12px 42px;border-radius:999px;
    border:1px solid var(--border);background:var(--bg-soft);color:var(--text);
    font-size:.95rem;outline:none;transition:border .2s, box-shadow .2s;
  }
  .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .search-wrap svg{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--text-dim);
  }

  .counter{color:var(--text-dim);font-size:.85rem;white-space:nowrap;}

  /* ---------- FILTERS ---------- */
  .filters{
    max-width:1200px;margin:16px auto 0;padding:0 20px;
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .chip{
    padding:7px 14px;border-radius:999px;border:1px solid var(--border);
    background:var(--bg-soft);color:var(--text-dim);font-size:.82rem;cursor:pointer;
    transition:all .15s;user-select:none;
  }
  .chip:hover{color:var(--text);border-color:var(--accent);}
  .chip.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600;}

  /* ---------- GRID ---------- */
  main{max-width:1200px;margin:0 auto;padding:24px 20px 60px;}
  .grid{
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  }
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease, border-color .18s;
    display:flex;flex-direction:column;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow);
    border-color:var(--accent);
    background:var(--card-hover);
  }
  .card-img{
    width:100%;aspect-ratio:1/1;background:#10131a;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    position:relative;
  }
  .card-img img{
    width:100%;height:100%;object-fit:contain;padding:14px;
    transition:transform .3s ease;
  }
  .card:hover .card-img img{transform:scale(1.05);}
  .badge{
    position:absolute;top:8px;left:8px;background:rgba(212,175,106,.15);
    color:var(--accent);border:1px solid var(--accent);font-size:.65rem;
    padding:3px 8px;border-radius:999px;letter-spacing:.4px;text-transform:uppercase;font-weight:600;
  }
  .card-body{padding:12px 14px 16px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .card-name{
    font-size:.88rem;font-weight:600;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    min-height:2.3em;
  }
  .card-ean{color:var(--text-dim);font-size:.72rem;letter-spacing:.3px;}
  .card-price{margin-top:auto;padding-top:6px;font-size:1.05rem;font-weight:700;color:var(--accent);}

  .empty-state{
    grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim);
  }
  .empty-state svg{width:52px;height:52px;stroke:var(--text-dim);margin-bottom:12px;}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,7,10,.75);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
    opacity:0;transition:opacity .2s ease;
  }
  .overlay.open{display:flex;opacity:1;}
  .modal{
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    max-width:760px;width:100%;max-height:88vh;overflow-y:auto;position:relative;
    box-shadow:0 25px 60px rgba(0,0,0,.5);
    transform:translateY(16px) scale(.98);opacity:0;
    transition:transform .22s ease, opacity .22s ease;
  }
  .overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
  .modal-close{
    position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;
    background:var(--bg-soft);border:1px solid var(--border);color:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;
    font-size:1.2rem;line-height:1;transition:background .15s,border-color .15s;
  }
  .modal-close:hover{background:var(--card-hover);border-color:var(--accent);}
  .modal-grid{display:grid;grid-template-columns:1fr;}
  @media(min-width:640px){.modal-grid{grid-template-columns:1fr 1fr;}}
  .modal-img{
    background:#10131a;display:flex;align-items:center;justify-content:center;
    padding:30px;min-height:260px;
  }
  .modal-img img{max-width:100%;max-height:340px;object-fit:contain;}
  .modal-info{padding:26px 26px 28px;display:flex;flex-direction:column;gap:14px;}
  .modal-cat{
    align-self:flex-start;font-size:.7rem;letter-spacing:.5px;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--accent);padding:4px 10px;border-radius:999px;font-weight:600;
  }
  .modal-name{font-size:1.25rem;font-weight:700;line-height:1.35;margin:0;}
  .modal-price{font-size:1.7rem;font-weight:800;color:var(--accent);}
  .modal-meta{display:flex;flex-direction:column;gap:6px;font-size:.88rem;color:var(--text-dim);}
  .modal-meta b{color:var(--text);font-weight:600;}
  .modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 18px;border-radius:10px;font-weight:700;font-size:.95rem;
    border:none;cursor:pointer;text-decoration:none;transition:transform .12s,filter .12s;
  }
  .btn:active{transform:scale(.98);}
  .btn-whatsapp{background:var(--whatsapp);color:#06210f;}
  .btn-whatsapp:hover{filter:brightness(1.08);}
  .btn-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .btn-close:hover{color:var(--text);border-color:var(--accent);}

  footer{
    text-align:center;color:var(--text-dim);font-size:.8rem;padding:30px 20px 40px;border-top:1px solid var(--border);
  }
</style>

/* ======================================================
   UTILIDADES
   ====================================================== */
function formatPrice(n){
  return "$ " + n.toLocaleString("es-AR");
}

function onImgError(img){
  img.onerror = null;
  img.src = GENERIC_IMG;
}

/* ======================================================
   RENDER
   ====================================================== */
const grid = document.getElementById('grid');
const counter = document.getElementById('counter');
const searchInput = document.getElementById('searchInput');
const filtersEl = document.getElementById('filters');

let activeCat = "Todos";

function buildFilters(){
  const cats = ["Todos", ...new Set(PRODUCTS.map(p => p.cat))];
  filtersEl.innerHTML = cats.map(c =>
    `<div class="chip ${c === activeCat ? 'active' : ''}" data-cat="${c}">${c}</div>`
  ).join('');
  filtersEl.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeCat = chip.dataset.cat;
      buildFilters();
      renderGrid();
    });
  });
}

function renderGrid(){
  const q = searchInput.value.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    const matchesQuery = !q || p.name.toLowerCase().includes(q) || p.ean.includes(q);
    const matchesCat = activeCat === "Todos" || p.cat === activeCat;
    return matchesQuery && matchesCat;
  });

  counter.textContent = filtered.length + (filtered.length === 1 ? " producto" : " productos");

  if(filtered.length === 0){
    grid.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div>No se encontraron productos para tu búsqueda.</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" data-ean="${p.ean}">
      <div class="card-img">
        <span class="badge">${p.cat}</span>
        <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="onImgError(this)">
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-ean">EAN ${p.ean}</div>
        <div class="card-price">${formatPrice(p.price)}</div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.ean));
  });
}

   ====================================================== */

function openModal(ean){
  const p = PRODUCTS.find(x => x.ean === ean);
  if(!p) return;

  modalImg.src = p.img;
  modalImg.alt = p.name;
  modalImg.onerror = () => onImgError(modalImg);
  modalName.textContent = p.name;
  modalPrice.textContent = formatPrice(p.price);
  modalEan.textContent = p.ean;
  modalBrand.textContent = p.brand;
  modalCat.textContent = p.cat;

  const msg = encodeURIComponent(`Hola, quiero consultar por: ${p.name} (EAN ${p.ean}) - ${formatPrice(p.price)}`);
  modalWhatsapp.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if(e.target === overlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
});

/* ======================================================
   INIT
   ====================================================== */
searchInput.addEventListener('input', renderGrid);
buildFilters();
renderGrid();
</script>
</body>
</html>
